llm_backend:
  mode: local_claude_proxy
  base_url: "http://127.0.0.1:8317/v1"
  api_key: "not-needed"

task_routing:
  analyst_reasoning:
    primary_model: "openai/claude-sonnet-4-6"
    fallback_model: "openai/claude-sonnet-4-6"
    retries: 1

  chart_extract:
    primary_model: "openai/claude-sonnet-4-6"
    fallback_model: "openai/claude-sonnet-4-6"
    retries: 1

  chart_interpret:
    primary_model: "openai/claude-sonnet-4-6"
    fallback_model: "openai/claude-sonnet-4-6"
    retries: 1

  arbiter_decision:
    primary_model: "openai/claude-sonnet-4-6"
    fallback_model: "openai/claude-sonnet-4-6"
    retries: 1

  json_repair:
    primary_model: "openai/claude-sonnet-4-6"
    fallback_model: "openai/claude-sonnet-4-6"
    retries: 1

# Analyst roster — maps persona to the LLM model used for fan-out analysis.
# Each entry defines the model identifier (routed through LiteLLM) and the
# persona type constant from ai_analyst.models.persona.PersonaType.
analyst_roster:
  - model: "gpt-4o"
    persona: "default_analyst"
  - model: "claude-sonnet-4-6"
    persona: "risk_officer"
  - model: "gemini/gemini-1.5-pro"
    persona: "prosecutor"
  - model: "xai/grok-vision-beta"
    persona: "ict_purist"
