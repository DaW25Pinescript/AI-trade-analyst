# LLM Backend — connection settings for the OpenAI-compatible proxy.
# The api_key below is a placeholder. For real proxy auth, set the env var:
#   export LOCAL_LLM_PROXY_API_KEY="your-real-key"
# The env var always takes precedence over the value in this file.
llm_backend:
  mode: local_claude_proxy
  base_url: "http://127.0.0.1:8317/v1"
  api_key: "not-needed"

task_routing:
  analyst_reasoning:
    primary_model: "resolved_by_profile_registry"
    fallback_model: "resolved_by_profile_registry"
    retries: 1

  chart_extract:
    primary_model: "openai/claude-sonnet-4-6"
    fallback_model: "openai/claude-sonnet-4-6"
    retries: 1

  chart_interpret:
    primary_model: "openai/claude-sonnet-4-6"
    fallback_model: "openai/claude-sonnet-4-6"
    retries: 1

  arbiter_decision:
    primary_model: "resolved_by_profile_registry"
    fallback_model: "resolved_by_profile_registry"
    retries: 1

  json_repair:
    primary_model: "openai/claude-sonnet-4-6"
    fallback_model: "openai/claude-sonnet-4-6"
    retries: 1

# Analyst roster — maps persona to runtime model profile used for fan-out analysis.
analyst_roster:
  - profile: "claude_sonnet"
    persona: "default_analyst"
  - profile: "claude_sonnet"
    persona: "risk_officer"
  - profile: "claude_sonnet"
    persona: "prosecutor"
  - profile: "claude_sonnet"
    persona: "ict_purist"
