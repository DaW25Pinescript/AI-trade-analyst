      <stop offset="0%" stop-color="#071a33"/>
      <stop offset="100%" stop-color="#0f3a66"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6de4ff"/>
      <stop offset="100%" stop-color="#2b86ff"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="700" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#8fd0ff" stroke-width="2" fill="none">
