  <text x="430" y="340" fill="#e7eefc" font-size="140" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">AI</text>
  <text x="700" y="315" fill="#e7eefc" font-size="92" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">TRADE</text>
  <text x="700" y="420" fill="#e7eefc" font-size="92" font-family="Segoe UI, Inter, Arial, sans-serif" font-weight="700">ANALYST</text>
