name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  browser-tests:
    name: Browser app tests (node)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run browser app tests
        run: node --test tests/*.js

  analyst-tests:
    name: AI analyst tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project (editable) and dev dependencies
        run: pip install -e ".[dev]"

      - name: Scan analyst dependencies for CVEs
        run: pip install pip-audit && pip-audit -r ai_analyst/requirements.txt

      - name: Run analyst tests with coverage
        run: pytest --cov=ai_analyst --cov-report=term-missing --cov-fail-under=70 -q ai_analyst/tests

  mro-tests:
    name: Macro Risk Officer tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project (editable) and MRO dependencies
        run: |
          pip install -e ".[dev,mro]"
          pip install -r macro_risk_officer/requirements.txt

      - name: Scan MRO dependencies for CVEs
        run: pip install pip-audit && pip-audit -r macro_risk_officer/requirements.txt

      - name: Run MRO tests with coverage
        run: pytest --cov=macro_risk_officer --cov-report=term-missing --cov-fail-under=70 -q macro_risk_officer/tests

  mdo-tests:
    name: Market Data Officer tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project (editable) and MDO dependencies
        run: |
          pip install -e ".[dev,mdo]"
          pip install -r market_data_officer/requirements.txt

      - name: Run MDO tests with coverage
        run: pytest --cov=market_data_officer --cov-report=term-missing -q market_data_officer/tests

  root-python-tests:
    name: Root Python integration tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install project (editable) and all dependencies
        run: |
          pip install -e ".[dev,mdo]"
          pip install -r requirements.txt

      - name: Run root Python tests
        run: pytest -q tests/*.py
