name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  browser-tests:
    name: Browser app tests (node)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run browser app tests
        run: node --test tests/*.js

  analyst-tests:
    name: AI analyst tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install analyst dependencies
        run: pip install -r ai_analyst/requirements.txt

      - name: Scan analyst dependencies for CVEs
        run: pip install pip-audit && pip-audit -r ai_analyst/requirements.txt

      - name: Run analyst tests with coverage
        run: pytest --cov=ai_analyst --cov-report=term-missing --cov-fail-under=70 -q ai_analyst/tests

  mro-tests:
    name: Macro Risk Officer tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MRO dependencies
        run: pip install -r macro_risk_officer/requirements.txt

      - name: Scan MRO dependencies for CVEs
        run: pip install pip-audit && pip-audit -r macro_risk_officer/requirements.txt

      - name: Run MRO tests with coverage
        run: pytest --cov=macro_risk_officer --cov-report=term-missing --cov-fail-under=70 -q macro_risk_officer/tests
